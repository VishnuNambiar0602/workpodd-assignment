version: '3.8'

services:
  postgres:
    image: pgvector/pgvector:pg16
    container_name: refund-system-db
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: refund_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d refund_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  pgdata:
